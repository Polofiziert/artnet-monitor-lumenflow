# Virtual Art-Net network for LumenFlow testing.
# Usage: docker compose -f docker-compose.virtual-network.yml up
#
# Run LumenFlow with: pnpm run dev:docker
# (or set LUMENFLOW_DISCOVERY_TARGETS=127.0.0.1:6455,127.0.0.1:6456,127.0.0.1:6457)

services:
  console-a:
    build: .
    command: virtual-console --name "Desk A" --ip 10.0.0.10 --universes 8 --rate 44 --pattern sine --target host.docker.internal
    ports:
      - "6455:6454/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  console-b:
    build: .
    command: virtual-console --name "Desk B" --ip 10.0.0.11 --universes 8 --rate 44 --pattern chase --target host.docker.internal
    ports:
      - "6456:6454/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  node:
    build: .
    command: virtual-node --name "Virtual Node 1" --ip 10.0.0.20 --port 6454 --target host.docker.internal
    ports:
      - "6457:6454/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
