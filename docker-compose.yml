version: "3.9"

services:
  # Development environment with Rust and Node.js
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
    working_dir: /workspace
    command: bash
    stdin_open: true
    tty: true

  # Production runtime for CLI/daemon
  lumenflow-cli:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "6454:6454/udp"
    environment:
      - RUST_LOG=debug
    restart: unless-stopped

volumes:
  cargo-cache:
